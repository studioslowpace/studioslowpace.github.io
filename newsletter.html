<!DOCTYPE html>
<html lang="zh-TW" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>客舍電子報管理系統</title>
    <!-- 引入 Tailwind CSS 進行現代化排版與深色模式支援 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <!-- 引入 FontAwesome 圖標 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 隱藏滾動條但保持滾動功能 (用於手機橫滑相片) */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 min-h-screen flex flex-col transition-colors duration-300 antialiased selection:bg-indigo-500/30">

<div id="header-container" class="navbar-wrapper"></div>

    <!-- 導覽列 -->
    <nav class="border-b border-gray-200 dark:border-gray-800 bg-white/90 dark:bg-gray-800/90 backdrop-blur sticky top-0 z-50 transition-colors duration-300">
        <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-2.5 cursor-pointer" onclick="backToHome()">
                <i class="fa-solid fa-hotel text-indigo-600 dark:text-indigo-400 text-xl md:text-2xl"></i>
                <span class="font-bold text-lg md:text-xl tracking-tight">客舍電子報</span>
            </div>
            
            <!-- 智慧工具列 -->
            <div class="flex items-center space-x-2 md:space-x-3">
                <!-- 深淺色切換 -->
                <button id="themeToggle" class="p-2.5 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-500 dark:text-gray-400" title="切換深淺色">
                    <i class="fa-solid fa-sun hidden dark:block text-lg"></i>
                    <i class="fa-solid fa-moon block dark:hidden text-lg"></i>
                </button>

                <!-- 修改密碼 -->
                <button id="changePwdBtn" class="hidden flex items-center space-x-1 bg-amber-500 hover:bg-amber-600 text-white p-2.5 md:px-3 md:py-2 rounded-xl text-sm font-medium shadow transition-all" title="修改管理密碼">
                    <i class="fa-solid fa-key"></i>
                    <span class="hidden md:inline">修改密碼</span>
                </button>

                <!-- 讀者/管理員切換 -->
                <button id="modeToggleBtn" class="flex items-center space-x-1.5 bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-2.5 md:px-4 md:py-2 rounded-xl text-sm font-medium shadow transition-all">
                    <i class="fa-solid fa-lock text-xs"></i>
                    <span id="modeBtnText" class="text-xs md:text-sm">管理員</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- 【主頁面視窗】 -->
    <div id="homePage" class="max-w-4xl w-full mx-auto px-4 py-6 md:py-8 flex-grow block">
        <!-- 搜尋功能欄位 -->
        <div class="mb-6 md:mb-8 relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>
            <input type="text" id="searchInput" class="w-full pl-11 pr-24 py-3 md:py-3.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 focus:ring-2 focus:ring-indigo-500 outline-none shadow-sm text-base transition-all" placeholder="搜尋標題、內文、作者...">
            <!-- 清除篩選提示按鈕 -->
            <button id="clearSearchBtn" onclick="clearFilter()" class="hidden absolute inset-y-0 right-0 pr-4 flex items-center text-sm text-indigo-500 hover:text-indigo-700 dark:hover:text-indigo-400 font-medium">
                清除篩選
            </button>
        </div>

        <!-- 後台管理：發布與編輯區塊 -->
        <section id="adminPanel" class="hidden mb-4 bg-white dark:bg-gray-800 rounded-2xl p-5 md:p-6 border border-gray-200 dark:border-gray-700 shadow-sm transition-all">
            <div class="flex items-center justify-between pb-4 mb-5 border-b border-gray-100 dark:border-gray-700">
                <h2 id="panelTitle" class="text-lg md:text-xl font-bold flex items-center space-x-2 text-indigo-600 dark:text-indigo-400">
                    <i class="fa-solid fa-pen-to-square"></i>
                    <span>發布新電子報文章</span>
                </h2>
            </div>
            
            <div class="space-y-4">
                <!-- 欄位組 -->
                <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4">
                    <div>
                        <label class="block text-xs md:text-sm font-semibold mb-1.5 text-gray-500 dark:text-gray-400">文章標題</label>
                        <input type="text" id="postTitle" class="w-full px-4 py-2.5 rounded-xl border border-gray-300 dark:border-gray-600 bg-transparent focus:ring-2 focus:ring-indigo-500 outline-none text-base">
                    </div>
                    <div>
                        <label class="block text-xs md:text-sm font-semibold mb-1.5 text-gray-500 dark:text-gray-400">文章作者</label>
                        <input type="text" id="postAuthor" class="w-full px-4 py-2.5 rounded-xl border border-gray-300 dark:border-gray-600 bg-transparent focus:ring-2 focus:ring-indigo-500 outline-none text-base">
                    </div>
                    <div>
                        <label class="block text-xs md:text-sm font-semibold mb-1.5 text-gray-500 dark:text-gray-400">文章期數</label>
                        <input type="text" id="postIssue" class="w-full px-4 py-2.5 rounded-xl border border-gray-300 dark:border-gray-600 bg-transparent focus:ring-2 focus:ring-indigo-500 outline-none text-base" placeholder="例如：第 003 期">
                    </div>
                    <div>
                        <label class="block text-xs md:text-sm font-semibold mb-1.5 text-gray-500 dark:text-gray-400">文章分類</label>
                        <input type="text" id="postCategory" class="w-full px-4 py-2.5 rounded-xl border border-gray-300 dark:border-gray-600 bg-transparent focus:ring-2 focus:ring-indigo-500 outline-none text-base" placeholder="例如：生活隨筆">
                    </div>
                </div>

                <div>
                    <label class="block text-xs md:text-sm font-semibold mb-1.5 text-gray-500 dark:text-gray-400">文章內文</label>
                    <textarea id="postContent" rows="6" class="w-full px-4 py-2.5 rounded-xl border border-gray-300 dark:border-gray-600 bg-transparent focus:ring-2 focus:ring-indigo-500 outline-none text-base leading-relaxed"></textarea>
                </div>
                
                <!-- 附加相片欄位 -->
                <div>
                    <div class="flex items-center justify-between mb-1.5">
                        <label class="block text-xs md:text-sm font-semibold text-gray-500 dark:text-gray-400">附加相片 (支援多選)</label>
                        <button id="clearImgBtn" onclick="clearImageInput()" class="hidden text-xs text-rose-500 font-bold hover:underline"><i class="fa-solid fa-circle-xmark"></i> 清空已選</button>
                    </div>
                    <input type="file" id="postImage" accept="image/*" multiple class="block w-full text-sm text-gray-500 dark:text-gray-400 file:mr-4 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-bold file:bg-indigo-50 file:text-indigo-700 dark:file:bg-indigo-950/40 dark:file:text-indigo-300 hover:file:bg-indigo-100 cursor-pointer">
                    
                    <!-- 預覽多張圖片縮圖區 -->
                    <div id="imgPreviewContainer" class="mt-3 hidden bg-gray-50 dark:bg-gray-900/40 p-3 rounded-xl border border-gray-200 dark:border-gray-700">
                        <div id="imgPreviewGrid" class="flex flex-wrap gap-2.5"></div>
                    </div>
                </div>
                
                <!-- 操作按鈕組 -->
                <div class="flex flex-col sm:flex-row justify-end gap-2 pt-2">
                    <button id="cancelEditBtn" onclick="resetForm()" class="hidden w-full sm:w-auto order-2 sm:order-1 px-5 py-3 rounded-xl text-sm font-bold text-gray-500 hover:text-gray-700 dark:text-gray-400 bg-gray-100 dark:bg-gray-700/50 sm:bg-transparent">取消修改</button>
                    <button id="submitPostBtn" onclick="submitArticleForm()" class="w-full sm:w-auto order-1 sm:order-2 bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-6 py-3 rounded-xl shadow flex items-center justify-center space-x-2 transition-all">
                        <i class="fa-solid fa-paper-plane"></i>
                        <span id="submitBtnText">立即發布文章</span>
                    </button>
                </div>
            </div>
        </section>

        <!-- 獨立的數據備份區塊（位於發布新文章欄目正下方） -->
        <section id="backupPanel" class="hidden mb-8 md:mb-12 bg-white dark:bg-gray-800 rounded-2xl p-4 md:p-5 border border-gray-200 dark:border-gray-700 shadow-sm transition-all">
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
                <div class="flex items-center space-x-2 text-gray-700 dark:text-gray-300">
                    <i class="fa-solid fa-database text-indigo-500"></i>
                    <span class="text-sm font-bold">系統數據本地備份與還原</span>
                </div>
                <div class="grid grid-cols-2 gap-2 w-full sm:w-auto sm:flex sm:items-center">
                    <button onclick="exportBackupJSON()" class="text-xs bg-emerald-600 hover:bg-emerald-700 text-white py-2.5 px-4 rounded-xl transition-all shadow-sm font-bold flex items-center justify-center space-x-1.5">
                        <i class="fa-solid fa-download"></i> <span>匯出資料備份</span>
                    </button>
                    <label class="text-xs bg-sky-600 hover:bg-sky-700 text-white py-2.5 px-4 rounded-xl transition-all shadow-sm cursor-pointer inline-flex items-center justify-center space-x-1.5 font-bold">
                        <i class="fa-solid fa-upload"></i> <span>匯入還原資料</span>
                        <input type="file" id="importFile" accept=".json" class="hidden" onchange="importBackupJSON(this)">
                    </label>
                </div>
            </div>
        </section>

        <!-- 電子報文章列表區 -->
        <section>
            <div class="flex items-center justify-between mb-4 md:mb-6">
                <h2 class="text-xl md:text-2xl font-black tracking-tight">最近文章</h2>
                <span id="postCount" class="text-xs md:text-sm text-gray-500 bg-gray-200/60 dark:bg-gray-800 px-2.5 py-1 rounded-full font-medium">共 0 篇</span>
            </div>
            <div id="postsContainer" class="space-y-4 md:space-y-6"></div>
            <div id="emptyState" class="hidden text-center py-16 border-2 border-dashed border-gray-200 dark:border-gray-800 rounded-2xl">
                <i class="fa-solid fa-mailbox text-4xl text-gray-300 dark:text-gray-700 mb-3 block"></i>
                <p class="text-gray-400 dark:text-gray-500 text-sm">找不到相符的電子報內容。</p>
            </div>
        </section>
    </div>

    <!-- 【詳細內容獨立頁面視窗】 -->
    <div id="articlePage" class="max-w-3xl w-full mx-auto px-4 py-6 md:py-12 flex-grow hidden">
        <button onclick="backToHome()" class="mb-5 md:mb-8 flex items-center space-x-2 text-gray-500 hover:text-indigo-600 dark:text-gray-400 dark:hover:text-indigo-400 font-bold transition-colors group">
            <i class="fa-solid fa-arrow-left transition-transform group-hover:-translate-x-1"></i>
            <span>返回電子報列表</span>
        </button>
        
        <article class="bg-white dark:bg-gray-800 rounded-2xl md:rounded-3xl p-5 md:p-10 border border-gray-200 dark:border-gray-700 shadow-sm overflow-hidden flex flex-col">
            <div class="flex flex-wrap gap-1.5 mb-3.5 order-1">
                <span id="detailIssue" onclick="filterByTag(this.innerText)" class="text-[11px] font-bold px-2.5 py-1 bg-indigo-50 dark:bg-indigo-950/60 text-indigo-700 dark:text-indigo-300 rounded-md border border-indigo-100 dark:border-indigo-900/40 cursor-pointer"></span>
                <span id="detailCategory" onclick="filterByTag(this.innerText)" class="text-[11px] font-bold px-2.5 py-1 bg-amber-50 dark:bg-amber-950/60 text-amber-700 dark:text-amber-300 rounded-md border border-amber-100 dark:border-amber-900/40 cursor-pointer"></span>
                <span id="detailAuthor" onclick="filterByTag(this.getAttribute('data-val'))" class="text-[11px] font-semibold px-2.5 py-1 bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 rounded-md cursor-pointer"></span>
            </div>
            
            <h1 id="detailTitle" class="text-xl md:text-3xl font-black text-gray-900 dark:text-white leading-snug mb-4 order-2"></h1>
            
            <div class="flex items-center text-[11px] text-gray-400 dark:text-gray-500 space-x-4 mb-6 pb-4 border-b border-b-gray-100 dark:border-b-gray-700 order-3">
                <span class="flex items-center space-x-1">
                    <i class="fa-regular fa-clock"></i>
                    <time id="detailDate"></time>
                </span>
                <span id="detailViewsContainer" class="hidden flex items-center space-x-1 text-indigo-500">
                    <i class="fa-solid fa-eye"></i>
                    <span id="detailViews">0 次瀏覽</span>
                </span>
            </div>
            
            <p id="detailContent" class="text-gray-700 dark:text-gray-200 whitespace-pre-line text-base md:text-lg leading-relaxed mb-6 order-4 break-words"></p>

            <!-- 相片置底區 -->
            <div id="detailImgContainer" class="mt-2 pt-4 border-t border-gray-100 dark:border-gray-750 hidden order-5 relative w-full">
                <!-- 由 JS 動態生成 -->
            </div>
        </article>
    </div>

    <!-- 密碼驗證彈窗 -->
    <div id="pwdModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 rounded-2xl max-w-md w-full p-5 md:p-6 shadow-2xl border border-gray-100 dark:border-gray-700 transform scale-95 opacity-0 transition-all duration-300" id="modalCard">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-base md:text-lg font-bold text-gray-900 dark:text-white" id="modalTitle">身分驗證</h3>
                <button onclick="closeModal()" class="text-gray-400 p-1 hover:text-gray-600 dark:hover:text-gray-300"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <div id="loginForm">
                <p class="text-gray-500 dark:text-gray-400 text-xs md:text-sm mb-4">請輸入管理員密碼以解鎖編輯功能。<br><span class="text-xs text-amber-500 font-medium">（預設為：admin123）</span></p>
                <input type="password" id="adminPwd" class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-transparent focus:ring-2 focus:ring-indigo-500 outline-none mb-2 text-base" placeholder="輸入密碼..." onkeydown="if(event.key==='Enter') verifyPassword()">
            </div>
            <div id="changePwdForm" class="hidden space-y-3">
                <div>
                    <label class="block text-xs text-gray-400 mb-1">新管理密碼</label>
                    <input type="password" id="newPwd1" class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-transparent focus:ring-2 focus:ring-indigo-500 outline-none text-base" placeholder="請輸入新密碼...">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">再次確認新密碼</label>
                    <input type="password" id="newPwd2" class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-transparent focus:ring-2 focus:ring-indigo-500 outline-none text-base" placeholder="請再次輸入新密碼...">
                </div>
            </div>
            <div id="pwdError" class="text-red-500 text-xs hidden mt-2 flex items-center space-x-1">
                <i class="fa-solid fa-circle-exclamation"></i> <span id="errorText">密碼錯誤。</span>
            </div>
            <div class="flex space-x-3 justify-end pt-4">
                <button onclick="closeModal()" class="px-4 py-2.5 text-sm font-medium text-gray-500">取消</button>
                <button id="modalSubmitBtn" onclick="verifyPassword()" class="px-5 py-2.5 text-sm font-bold bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl shadow-sm">確認解鎖</button>
            </div>
        </div>
    </div>


   <footer id="global-footer" class="custom-footer"></footer>

    <script>
        const SECURE_STORAGE_KEY = 'kese_newsletter_data_secure';
        
        let adminPassword = localStorage.getItem('admin_pwd') || "admin123";
        let searchQuery = "";
        let isAdminMode = false;
        let editingPostId = null; 
        let currentUploadedImagesArray = []; 
        let currentCarouselIndex = 0;

        let posts = JSON.parse(localStorage.getItem(SECURE_STORAGE_KEY)) || [
            {
                id: 1,
                issue: "第 001 期",
                category: "科技趨勢",
                author: "客舍主筆",
                title: "🚀 客舍電子報正式創刊！聊聊未來的網頁前端趨勢",
                content: "親愛的讀者您好，歡迎來到客舍電子報的創刊號！隨著 AI 輔助程式碼生成的普及，前端工程師的定位正在發生大轉變。未來我們更看重架構設計能力、使用者體驗（UX）微調，以及極致的效能優化。此外，邊緣運算（Edge Computing）與 SSR 的結合將變得更加緊密。客舍未來將持續為您帶來第一手科技與美學的深度解析，請密切鎖定我們的後續更新！",
                date: "2026-05-20 10:30",
                views: 42,
                images: []
            }
        ];

        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            renderPosts();
            setupEventListeners();
        });

        function initTheme() {
            if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        }

        function setupEventListeners() {
            document.getElementById('themeToggle').addEventListener('click', () => {
                if (document.documentElement.classList.contains('dark')) {
                    document.documentElement.classList.remove('dark');
                    localStorage.theme = 'light';
                } else {
                    document.documentElement.classList.add('dark');
                    localStorage.theme = 'dark';
                }
            });

            document.getElementById('modeToggleBtn').addEventListener('click', () => {
                if (!isAdminMode) openModal('login'); else exitAdminMode();
            });

            document.getElementById('searchInput').addEventListener('input', (e) => {
                searchQuery = e.target.value.toLowerCase().trim();
                toggleClearBtn();
                renderPosts();
            });

            document.getElementById('changePwdBtn').addEventListener('click', () => {
                if (isAdminMode) openModal('changePwd');
            });

            document.getElementById('postImage').addEventListener('change', function(e) {
                const files = e.target.files;
                if (files.length > 0) {
                    document.getElementById('imgPreviewContainer').classList.remove('hidden');
                    document.getElementById('clearImgBtn').classList.remove('hidden');
                    
                    Array.from(files).forEach(file => {
                        const reader = new FileReader();
                        reader.onload = function(event) {
                            currentUploadedImagesArray.push(event.target.result);
                            renderFormImagePreviews();
                        };
                        reader.readAsDataURL(file);
                    });
                }
            });
        }

        function renderFormImagePreviews() {
            const grid = document.getElementById('imgPreviewGrid');
            if (currentUploadedImagesArray.length === 0) {
                document.getElementById('imgPreviewContainer').classList.add('hidden');
                document.getElementById('clearImgBtn').classList.add('hidden');
                grid.innerHTML = '';
                return;
            }
            
            grid.innerHTML = currentUploadedImagesArray.map((img, index) => `
                <div class="relative group h-16 w-16 md:h-20 md:w-20 border border-gray-200 dark:border-gray-700 rounded-xl overflow-hidden bg-gray-100 dark:bg-gray-900">
                    <img src="${img}" class="h-full w-full object-cover">
                    <button onclick="removeSingleImageFromForm(${index})" class="absolute top-1 right-1 bg-black/70 text-white rounded-full h-5 w-5 text-xs flex items-center justify-center opacity-100" title="刪除">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
            `).join('');
        }

        function removeSingleImageFromForm(index) {
            currentUploadedImagesArray.splice(index, 1);
            renderFormImagePreviews();
        }

        function clearImageInput() {
            document.getElementById('postImage').value = "";
            currentUploadedImagesArray = [];
            renderFormImagePreviews();
        }

        function filterByTag(val) {
            if(!val) return;
            backToHome();
            const cleanedVal = val.replace('作者：', '').trim();
            document.getElementById('searchInput').value = cleanedVal;
            searchQuery = cleanedVal.toLowerCase();
            toggleClearBtn();
            renderPosts();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function clearFilter() {
            document.getElementById('searchInput').value = "";
            searchQuery = "";
            toggleClearBtn();
            renderPosts();
        }

        function toggleClearBtn() {
            const btn = document.getElementById('clearSearchBtn');
            if (searchQuery) btn.classList.remove('hidden'); else btn.classList.add('hidden');
        }

        function openModal(mode = 'login') {
            const modal = document.getElementById('pwdModal');
            const card = document.getElementById('modalCard');
            const title = document.getElementById('modalTitle');
            const loginForm = document.getElementById('loginForm');
            const changeForm = document.getElementById('changePwdForm');
            const submitBtn = document.getElementById('modalSubmitBtn');

            modal.classList.remove('hidden');
            if (mode === 'login') {
                title.innerText = "管理員登入";
                loginForm.classList.remove('hidden');
                changeForm.classList.add('hidden');
                submitBtn.innerText = "確認解鎖";
                submitBtn.setAttribute('onclick', 'verifyPassword()');
                setTimeout(() => document.getElementById('adminPwd').focus(), 150);
            } else {
                title.innerText = "變更管理密碼";
                loginForm.classList.add('hidden');
                changeForm.classList.remove('hidden');
                submitBtn.innerText = "儲存新密碼";
                submitBtn.setAttribute('onclick', 'saveNewPassword()');
                setTimeout(() => document.getElementById('newPwd1').focus(), 150);
            }
            setTimeout(() => card.classList.remove('scale-95', 'opacity-0'), 10);
        }

        function closeModal() {
            const modal = document.getElementById('pwdModal');
            const card = document.getElementById('modalCard');
            card.classList.add('scale-95', 'opacity-0');
            document.getElementById('pwdError').classList.add('hidden');
            document.getElementById('adminPwd').value = '';
            document.getElementById('newPwd1').value = '';
            document.getElementById('newPwd2').value = '';
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        function verifyPassword() {
            if (document.getElementById('adminPwd').value === adminPassword) {
                enterAdminMode();
                closeModal();
            } else {
                showError('密碼錯誤，請再試一次。');
            }
        }

        function saveNewPassword() {
            const p1 = document.getElementById('newPwd1').value;
            const p2 = document.getElementById('newPwd2').value;
            if (!p1.trim()) { showError('新密碼不能為空！'); return; }
            if (p1 !== p2) { showError('兩次輸入的新密碼不相符。'); return; }
            adminPassword = p1;
            localStorage.setItem('admin_pwd', p1);
            alert('管理密碼修改成功！');
            closeModal();
        }

        function showError(msg) {
            const errHint = document.getElementById('pwdError');
            document.getElementById('errorText').innerText = msg;
            errHint.classList.remove('hidden');
        }

        function enterAdminMode() {
            isAdminMode = true;
            const btn = document.getElementById('modeToggleBtn');
            btn.innerHTML = `<i class="fa-solid fa-unlock-keyhole text-xs"></i> <span class="text-xs md:text-sm">退出管理</span>`;
            btn.classList.replace('bg-indigo-600', 'bg-rose-600');
            btn.classList.replace('hover:bg-indigo-700', 'hover:bg-rose-700');
            document.getElementById('changePwdBtn').classList.remove('hidden');

            const banner = document.getElementById('statusBanner');
            banner.classList.replace('bg-emerald-50', 'bg-indigo-50');
            banner.classList.replace('border-emerald-200', 'border-indigo-200');
            banner.classList.replace('text-emerald-800', 'text-indigo-800');
            banner.classList.replace('dark:bg-emerald-950/30', 'dark:bg-indigo-950/30');
            banner.classList.replace('dark:border-emerald-900/50', 'dark:border-indigo-900/50');
            banner.classList.replace('dark:text-emerald-400', 'dark:text-indigo-400');
            document.getElementById('statusText').innerText = "當前介面：管理員模式（具備完整管理與備份權限）";
            document.getElementById('adminBadge').classList.remove('hidden');

            document.getElementById('adminPanel').classList.remove('hidden');
            document.getElementById('backupPanel').classList.remove('hidden');
            renderPosts();
        }

        function exitAdminMode() {
            isAdminMode = false;
            const btn = document.getElementById('modeToggleBtn');
            btn.innerHTML = `<i class="fa-solid fa-lock text-xs"></i> <span class="text-xs md:text-sm">管理員</span>`;
            btn.classList.replace('bg-rose-600', 'bg-indigo-600');
            btn.classList.replace('hover:bg-rose-700', 'hover:bg-indigo-700');
            document.getElementById('changePwdBtn').classList.add('hidden');

            const banner = document.getElementById('statusBanner');
            banner.classList.replace('bg-indigo-50', 'bg-emerald-50');
            banner.classList.replace('border-indigo-200', 'border-emerald-200');
            banner.classList.replace('text-indigo-800', 'text-emerald-800');
            banner.classList.replace('dark:bg-indigo-950/30', 'dark:bg-emerald-950/30');
            banner.classList.replace('dark:border-indigo-900/50', 'dark:border-indigo-900/50');
            banner.classList.replace('dark:text-emerald-400', 'dark:text-emerald-400');
            document.getElementById('statusText').innerText = "當前介面：讀者模式（唯讀）";
            document.getElementById('adminBadge').classList.add('hidden');

            document.getElementById('adminPanel').classList.add('hidden');
            document.getElementById('backupPanel').classList.add('hidden');
            resetForm();
            renderPosts();
        }

        function navigateToArticle(id) {
            const post = posts.find(p => p.id === id);
            if (!post) return;

            post.views = (post.views || 0) + 1;
            saveToLocalStorage();

            document.getElementById('detailTitle').innerText = post.title;
            document.getElementById('detailIssue').innerText = post.issue || "特刊";
            document.getElementById('detailCategory').innerText = post.category || "一般";
            document.getElementById('detailAuthor').innerText = `作者：${post.author || '客舍編輯部'}`;
            document.getElementById('detailAuthor').setAttribute('data-val', post.author || '客舍編輯部');
            
            document.getElementById('detailDate').innerText = post.date;
            document.getElementById('detailContent').innerText = post.content;
            
            const detailImgBox = document.getElementById('detailImgContainer');
            const postImages = post.images || (post.image ? [post.image] : []);

            if (postImages && postImages.length > 0) {
                detailImgBox.classList.remove('hidden');
                
                if (postImages.length === 1) {
                    detailImgBox.innerHTML = `
                        <img src="${postImages[0]}" class="w-full max-h-[500px] object-contain rounded-xl bg-gray-50/50 dark:bg-gray-900/30 p-1 border border-gray-100 dark:border-gray-700">
                    `;
                } else {
                    currentCarouselIndex = 0;
                    window.currentArticleImages = postImages;
                    renderCarouselHTML();
                }
            } else {
                detailImgBox.innerHTML = '';
                detailImgBox.classList.add('hidden');
            }

            const viewsBox = document.getElementById('detailViewsContainer');
            if (isAdminMode) {
                document.getElementById('detailViews').innerText = `${post.views} 次瀏覽`;
                viewsBox.classList.remove('hidden');
            } else {
                viewsBox.classList.add('hidden');
            }

            document.getElementById('homePage').classList.replace('block', 'hidden');
            document.getElementById('articlePage').classList.replace('hidden', 'block');
            window.scrollTo({ top: 0, behavior: 'instant' });
        }

        function renderCarouselHTML() {
            const imgs = window.currentArticleImages;
            const container = document.getElementById('detailImgContainer');
            
            container.innerHTML = `
                <p class="text-[11px] text-gray-400 text-center mb-2 block md:hidden"><i class="fa-solid fa-hand-pointer animate-pulse"></i> 左右滑動可觀看更多相片 (${imgs.length}張)</p>
                
                <!-- 桌面版傳統切換 UI -->
                <div class="hidden md:flex relative w-full max-h-[500px] items-center justify-center bg-gray-50/70 dark:bg-gray-900/40 rounded-xl p-2 border border-gray-100 dark:border-gray-700 group">
                    <img id="carouselImg" src="${imgs[currentCarouselIndex]}" class="max-w-full max-h-[460px] object-contain rounded-lg transition-all duration-200">
                    <button onclick="switchCarousel(-1)" class="absolute left-3 bg-black/40 hover:bg-black/70 text-white w-10 h-10 rounded-full flex items-center justify-center backdrop-blur-sm shadow">
                        <i class="fa-solid fa-chevron-left text-lg"></i>
                    </button>
                    <button onclick="switchCarousel(1)" class="absolute right-3 bg-black/40 hover:bg-black/70 text-white w-10 h-10 rounded-full flex items-center justify-center backdrop-blur-sm shadow">
                        <i class="fa-solid fa-chevron-right text-lg"></i>
                    </button>
                    <div class="absolute bottom-4 bg-black/60 text-white px-3 py-1 rounded-full text-xs font-semibold">
                        <span id="carouselIndexText">${currentCarouselIndex + 1}</span> / ${imgs.length}
                    </div>
                </div>

                <!-- 手機版微波橫向滑動原生體驗 -->
                <div class="flex md:hidden overflow-x-auto snap-x snap-mandatory gap-4 no-scrollbar w-full py-1">
                    ${imgs.map(src => `
                        <div class="w-full shrink-0 snap-center flex justify-center items-center bg-gray-50/50 dark:bg-gray-900/30 rounded-xl border border-gray-100 dark:border-gray-700 p-1">
                            <img src="${src}" class="max-w-full max-h-[400px] object-contain rounded-lg">
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function switchCarousel(direction) {
            const imgs = window.currentArticleImages;
            currentCarouselIndex += direction;
            if (currentCarouselIndex < 0) currentCarouselIndex = imgs.length - 1;
            if (currentCarouselIndex >= imgs.length) currentCarouselIndex = 0;
            
            document.getElementById('carouselImg').src = imgs[currentCarouselIndex];
            document.getElementById('carouselIndexText').innerText = currentCarouselIndex + 1;
        }

        function backToHome() {
            document.getElementById('articlePage').classList.replace('block', 'hidden');
            document.getElementById('homePage').classList.replace('hidden', 'block');
            renderPosts();
        }

        function startEditPost(id) {
            const post = posts.find(p => p.id === id);
            if (!post) return;

            editingPostId = id;
            
            document.getElementById('postTitle').value = post.title;
            document.getElementById('postAuthor').value = post.author;
            document.getElementById('postIssue').value = post.issue;
            document.getElementById('postCategory').value = post.category;
            document.getElementById('postContent').value = post.content;
            
            if (post.images && post.images.length > 0) {
                currentUploadedImagesArray = [...post.images];
                renderFormImagePreviews();
            } else if (post.image) { 
                currentUploadedImagesArray = [post.image];
                renderFormImagePreviews();
            } else {
                clearImageInput();
            }

            document.getElementById('panelTitle').querySelector('span').innerText = "編輯/修改現有文章內容";
            document.getElementById('submitBtnText').innerText = "確認儲存修改";
            document.getElementById('cancelEditBtn').classList.remove('hidden');
            
            window.scrollTo({ top: document.getElementById('adminPanel').offsetTop - 80, behavior: 'smooth' });
        }

        function resetForm() {
            editingPostId = null;
            document.getElementById('postTitle').value = '';
            document.getElementById('postAuthor').value = '';
            document.getElementById('postIssue').value = '';
            document.getElementById('postCategory').value = '';
            document.getElementById('postContent').value = '';
            clearImageInput();

            document.getElementById('panelTitle').querySelector('span').innerText = "發布新電子報文章";
            document.getElementById('submitBtnText').innerText = "立即發布文章";
            document.getElementById('cancelEditBtn').classList.add('hidden');
        }

        function submitArticleForm() {
            if (!isAdminMode) return;

            const title = document.getElementById('postTitle').value.trim();
            const author = document.getElementById('postAuthor').value.trim() || "客舍編輯部";
            const issue = document.getElementById('postIssue').value.trim() || "特刊";
            const category = document.getElementById('postCategory').value.trim() || "一般";
            const content = document.getElementById('postContent').value.trim();

            if (!title || !content) {
                alert('標題與內文皆不能留空！');
                return;
            }

            if (editingPostId !== null) {
                const postIndex = posts.findIndex(p => p.id === editingPostId);
                if (postIndex !== -1) {
                    posts[postIndex].title = title;
                    posts[postIndex].author = author;
                    posts[postIndex].issue = issue;
                    posts[postIndex].category = category;
                    posts[postIndex].content = content;
                    posts[postIndex].images = [...currentUploadedImagesArray];
                    delete posts[postIndex].image;
                    alert('文章內容修改成功！');
                }
            } else {
                const now = new Date();
                const formattedDate = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
                
                const newPost = {
                    id: Date.now(),
                    issue: issue,
                    category: category,
                    author: author,
                    title: title,
                    content: content,
                    date: formattedDate,
                    views: 0,
                    images: [...currentUploadedImagesArray]
                };
                posts.push(newPost);
                alert('客舍電子報發布成功！');
            }

            saveToLocalStorage();
            resetForm();
            renderPosts();
        }

        function exportBackupJSON() {
            if(posts.length === 0) {
                alert('目前沒有任何文章可以匯出備份！');
                return;
            }
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(posts, null, 2));
            const downloadAnchor = document.createElement('a');
            const now = new Date();
            const dateStr = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
            
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", `客舍電子報備份_${dateStr}.json`);
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }

        function importBackupJSON(inputElement) {
            const file = inputElement.files[0];
            if (!file) return;

            if (!confirm('匯入備份會將目前的文章資料完全覆蓋，確定要執行嗎？')) {
                inputElement.value = '';
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    if (Array.isArray(importedData)) {
                        posts = importedData;
                        saveToLocalStorage();
                        renderPosts();
                        alert(`成功還原 ${importedData.length} 篇電子報文章！`);
                    } else {
                        alert('匯入失敗：這不是正確的客舍備份檔案格式。');
                    }
                } catch (err) {
                    alert('讀取檔案發生錯誤，請確保它是正確的 JSON 格式檔案。');
                }
                inputElement.value = '';
            };
            reader.readAsText(file);
        }

        function renderPosts() {
            const container = document.getElementById('postsContainer');
            const emptyState = document.getElementById('emptyState');

            const filteredPosts = posts.filter(post => {
                return post.title.toLowerCase().includes(searchQuery) || 
                       post.content.toLowerCase().includes(searchQuery) ||
                       post.author.toLowerCase().includes(searchQuery) ||
                       post.category.toLowerCase().includes(searchQuery) ||
                       post.issue.toLowerCase().includes(searchQuery);
            });

            document.getElementById('postCount').innerText = `共 ${filteredPosts.length} 篇`;

            if (filteredPosts.length === 0) {
                container.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }
            
            emptyState.classList.add('hidden');
            const sortedPosts = [...filteredPosts].reverse();

            container.innerHTML = sortedPosts.map(post => {
                const truncatedContent = post.content.length > 75 ? post.content.substring(0, 75) + "..." : post.content;
                const pImages = post.images || (post.image ? [post.image] : []);
                
                const hasImgBadge = pImages.length > 0 
                    ? `<span class="text-[10px] bg-gray-100 dark:bg-gray-700/50 text-gray-400 dark:text-gray-500 px-1.5 py-0.5 rounded flex items-center space-x-1">
                        <i class="fa-solid fa-images"></i> <span>${pImages.length}</span>
                       </span>` 
                    : '';

                const viewsHtml = isAdminMode 
                    ? `<span class="text-xs text-indigo-500 font-medium bg-indigo-50 dark:bg-indigo-950/40 px-2 py-0.5 rounded-md">
                        <i class="fa-solid fa-eye"></i> ${post.views || 0} 次
                       </span>` 
                    : '';

                const adminControlsHtml = isAdminMode 
                    ? `<div class="flex items-center space-x-2">
                        <button onclick="event.stopPropagation(); startEditPost(${post.id})" class="text-xs text-amber-600 font-bold hover:text-amber-700 dark:text-amber-400 bg-amber-50 dark:bg-amber-950/30 px-3 py-2 rounded-xl border border-amber-200/50 dark:border-amber-900/30 flex items-center space-x-1">
                            <i class="fa-solid fa-pen"></i> <span>編輯</span>
                        </button>
                        <button onclick="event.stopPropagation(); deletePost(${post.id})" class="text-xs text-rose-500 bg-rose-50 dark:bg-rose-950/30 px-3 py-2 rounded-xl flex items-center">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                       </div>` 
                    : '';

                return `
                    <article onclick="navigateToArticle(${post.id})" class="bg-white dark:bg-gray-800 rounded-xl p-5 border border-gray-200 dark:border-gray-700 shadow-sm active:scale-[0.99] md:hover:scale-100 transition-all duration-200 cursor-pointer select-none flex flex-col justify-between">
                        <div>
                            <div class="flex flex-wrap gap-1.5 mb-2 items-center">
                                <span onclick="event.stopPropagation(); filterByTag(this.innerText)" class="text-[10px] md:text-xs font-bold px-2 py-0.5 bg-indigo-50 dark:bg-indigo-950/60 text-indigo-700 dark:text-indigo-300 rounded border border-indigo-100 dark:border-indigo-900/40">${post.issue}</span>
                                <span onclick="event.stopPropagation(); filterByTag(this.innerText)" class="text-[10px] md:text-xs font-bold px-2 py-0.5 bg-amber-50 dark:bg-amber-950/60 text-amber-700 dark:text-amber-300 rounded border border-amber-100 dark:border-amber-900/40">${post.category}</span>
                                <span onclick="event.stopPropagation(); filterByTag(this.innerText)" class="text-[10px] md:text-xs text-gray-400 font-medium">作者:${post.author}</span>
                                ${hasImgBadge}
                                ${viewsHtml}
                            </div>
                            <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-1.5 leading-snug transition-colors">${post.title}</h3>
                            <p class="text-gray-500 dark:text-gray-400 text-xs md:text-sm leading-relaxed">${truncatedContent} <span class="text-indigo-500 text-xs font-bold ml-0.5">進入閱讀 →</span></p>
                        </div>
                        
                        <div class="flex items-center justify-between border-t border-gray-50 dark:border-gray-750 mt-3.5 pt-2.5">
                            <span class="text-[10px] text-gray-400 dark:text-gray-500"><i class="fa-regular fa-clock"></i> ${post.date}</span>
                            ${adminControlsHtml}
                        </div>
                    </article>
                `;
            }).join('');
        }

        function deletePost(id) {
            if (!isAdminMode) return;
            if (confirm('確定要刪除這篇文章嗎？')) {
                posts = posts.filter(post => post.id !== id);
                if(editingPostId === id) resetForm();
                saveToLocalStorage();
                renderPosts();
            }
        }

        function saveToLocalStorage() {
            localStorage.setItem(SECURE_STORAGE_KEY, JSON.stringify(posts));
        }

        // 1. 載入頁首
    fetch('header.html')
        .then(response => response.text())
        .then(data => {
            const container = document.getElementById('header-container');
            container.innerHTML = data;
            setupHeaderMenu(); // 載入後才綁定選單
        });

    // 2. 載入頁尾並處理年份
    fetch('footer.html')
        .then(response => response.text())
        .then(data => {
            const footerContainer = document.getElementById('global-footer');
            footerContainer.innerHTML = data;
            
            // 頁尾載入完成後，更新年份
            const yearSpan = document.getElementById('current-year');
            if (yearSpan) {
                yearSpan.textContent = new Date().getFullYear();
            }
        });

    // 3. 定義 Header 選單邏輯
    function setupHeaderMenu() {
        const toggleButton = document.querySelector('.menu-toggle');
        const navLinks = document.querySelector('.nav-links');

        if (toggleButton && navLinks) {
            toggleButton.addEventListener('click', (e) => {
                navLinks.classList.toggle('active');
                e.stopPropagation();
            });

            document.addEventListener('click', (e) => {
                if (navLinks.classList.contains('active') && !navLinks.contains(e.target) && e.target !== toggleButton) {
                    navLinks.classList.remove('active');
                }
            });
        }
    }
    </script>
</body>
</html>
