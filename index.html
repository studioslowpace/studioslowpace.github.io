<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客舍時間表</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f7f5f2; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 12px; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); border: 1px solid #ddd; }
        .cell { min-height: 100px; border: 1px solid #ddd; padding: 5px; cursor: pointer; }
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal-card { background: white; padding: 20px; border-radius: 8px; width: 300px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>每月時間表</h1>
        <span id="month-display" onclick="window.openModal('switchMonthModal')">點擊選月</span>
        <button onclick="window.toggleAdmin()">管理員登入</button>
    </div>
    <div id="calendar" class="grid"></div>
</div>

<div class="modal-overlay" id="switchMonthModal">
    <div class="modal-card">
        <h3>選擇月份</h3>
        <button onclick="window.closeModal('switchMonthModal')">關閉</button>
    </div>
</div>

<div class="modal-overlay" id="authModal">
    <div class="modal-card">
        <h3>管理員驗證</h3>
        <input type="password" id="admin-pwd" placeholder="輸入密碼">
        <button onclick="window.verifyAdmin()">確認登入</button>
        <button onclick="window.closeModal('authModal')">取消</button>
    </div>
</div>

<script>
    // 1. 初始化 Supabase
    const supabaseUrl = 'https://blqlrxqckiuvgevmakbu.supabase.co';
    const supabaseKey = 'sb_publishable_qFXwpuGChVdRwjc9K7prVQ_PgYmlnpG';
    const client = supabase.createClient(supabaseUrl, supabaseKey);

    // 2. 全域變數
    let currentMonth = "2026-06";
    let isAdmin = false;
    let events = {};

    // 3. 核心函式掛載至 window
    window.openModal = function(id) {
        document.getElementById(id).classList.add('active');
    };

    window.closeModal = function(id) {
        document.getElementById(id).classList.remove('active');
    };

    window.toggleAdmin = function() {
        if (!isAdmin) {
            window.openModal('authModal');
        } else {
            isAdmin = false;
            alert("已登出管理模式");
        }
    };

    window.verifyAdmin = function() {
        const pwd = document.getElementById('admin-pwd').value;
        if (pwd === "slow2024") {
            isAdmin = true;
            window.closeModal('authModal');
            alert("登入成功");
        } else {
            alert("密碼錯誤");
        }
    };

    window.renderCalendar = function() {
        const calendarEl = document.getElementById('calendar');
        calendarEl.innerHTML = '';
        ['日', '一', '二', '三', '四', '五', '六'].forEach(d => {
            calendarEl.innerHTML += `<div class="cell" style="font-weight:bold">${d}</div>`;
        });
        
        // 簡單渲染 30 天
        for (let i = 1; i <= 30; i++) {
            calendarEl.innerHTML += `<div class="cell" onclick="window.alert('日期: ${i}')">${i}</div>`;
        }
    };

    // 4. 啟動程序
    document.addEventListener('DOMContentLoaded', () => {
        window.renderCalendar();
    });
</script>
</body>
</html>
