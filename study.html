<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>空間共學 — Slow Pace Studio</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* ==========================================
           1. 全域重設與字型基礎 (Reset & Base)
           ========================================== */
        *, *::before, *::after {
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'PingFang HK', 'Heiti TC', 'Microsoft JhengHei', serif;
            background-color: #ffffff;
            color: #404040;
            line-height: 1.8;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 90%;
            max-width: 1500px;
            margin: 0 auto;
            position: relative;
        }

        img {
            max-width: 100%;
            height: auto;
            display: block;
        }

        .loading-status {
            text-align: center;
            padding: 50px 0;
            font-size: 16px;
            color: #888;
            letter-spacing: 1px;
        }

        /* ==========================================
           2. 主視覺橫幅 (Hero Section)
           ========================================== */
        .hero-section {
            position: relative;
            background-image: url('images/study1.jpg');
            background-size: cover;
            background-position: bottom center;
            height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            text-align: center;
            max-width: 1500px;
            margin: 0 auto;
            border-radius: 34px; 
            overflow: hidden;
        }

        /* ─── 修正：這是動態綁定背景色的文字區塊 ─── */
        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 750px;
            padding: 30px;                /* 加寬內邊距，讓背景色包覆得更好看 */
            display: flex;
            flex-direction: column;
            align-items: flex-start; 
            margin-left: auto;   
            margin-right: 5%;    
            border-radius: 12px;          /* 加上圓角 */
            background-color: rgba(0, 0, 0, 0.5); /* 預設基本半透明黑，會被資料庫動態顏色蓋過 */
            backdrop-filter: blur(5px);   /* 微毛玻璃質感 */
            -webkit-backdrop-filter: blur(5px);
            transition: background-color 0.5s ease;
        }

        /* 💡 秘密管理員入口：Logo 樣式 */
        .hero-logo-btn {
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            margin-bottom: 20px;
            transition: transform 0.3s ease, opacity 0.3s ease;
            outline: none;
            position: absolute; 
            bottom: 20px;   
            right: 25px;    
            margin: 0;      
            z-index: 10;
        }
        .hero-logo-btn:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }
        .hero-logo-btn img {
            width: 75px; 
            height: 75px;
            object-fit: contain;
            border-radius: 50%;
        }

        .hero-content h1 {
            font-size: 38px;
            margin: 0 0 15px 0;
            letter-spacing: 3px;
            font-weight: normal;
            text-align: left;
        }

        .hero-content p {
            font-size: 15px;
            color: #fff5f0;
            margin: 0;
            text-align: left;
        }

        /* ==========================================
           3. 動態渲染區：各章節外觀樣式
           ========================================== */
        .chapter-section {
            padding: 40px 25px;
            border-radius: 16px;
            margin-bottom: 50px;
            background-color: #ffffff;
        }

        .chapter-header-wrap {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 10px 0 40px;
            padding: 10px;
            border-radius: 8px;
        }

        .chapter-title {
            margin: 0;
            text-align: center;
        }
        .chapter-title h2 {
            font-size: 30px;
            color: #2c2c2c;
            font-weight: normal;
            letter-spacing: 1px;
            margin: 0;
        }

        /* 後台解鎖後的「修改 / 刪除」按鈕 */
        .action-btns {
            display: none; 
            gap: 10px;
        }
        .btn-edit, .btn-delete {
            background: #fff;
            border: 1px solid #ccc;
            padding: 6px 14px;
            font-size: 13px;
            color: #555;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
        }
        .btn-edit:hover { border-color: #404040; color: #1a1a1a; background: #f9f9f9; }
        .btn-delete:hover { border-color: #ff4d4f; color: #ff4d4f; background: #fff1f0; }

        .exhibition-block {
            display: flex;
            gap: 50px;
            margin-bottom: 40px;
            align-items: flex-start;
        }

        .exhibition-image {
            flex: 1;
            min-width: 320px;
        }
        .exhibition-image img {
            width: 100%;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }

        .exhibition-text {
            flex: 1.4;
        }

        .exhibition-text h3 {
            font-size: 22px;
            margin-top: 0;
            margin-bottom: 20px;
            color: #2c2c2c;
            font-weight: normal;
            line-height: 1.5;
        }

        .exhibition-text p {
            font-size: 15px;
            margin-bottom: 18px;
            text-align: justify;
            color: #4a4a4a;
        }

        .exhibition-text .date {
            font-weight: 500;
            margin: 25px 0;
            color: #666666;
            font-size: 14px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            background-color: #404040;
            color: #ffffff;
            text-decoration: none;
            padding: 12px 32px;
            font-size: 14px;
            letter-spacing: 1px;
            transition: background-color 0.3s ease;
            cursor: pointer;
            border: none;
            border-radius: 4px;
        }
        .btn:hover { background-color: #1a1a1a; }
        .btn .arrow { margin-left: 10px; font-size: 16px; }

        .divider {
            border: 0;
            height: 1px;
            background: rgba(0,0,0,0.08);
            margin: 40px 0;
        }

        .tour-block h3 {
            font-size: 20px;
            margin-bottom: 25px;
            text-align: center;
            font-weight: normal;
            color: #333;
        }

        /* ==========================================
           4. 動態多組輪播樣式 (Carousel)
           ========================================== */
        .carousel-container {
            position: relative;
            max-width: 860px;
            margin: 0 auto 20px auto;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border-radius: 8px;
        }

        .carousel-wrapper {
            display: flex;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            width: 100%;
        }

        .carousel-slide {
            min-width: 100%;
            position: relative;
            box-sizing: border-box;
        }

        .carousel-slide img {
            width: 100%;
            height: 520px;
            object-fit: cover;
        }

        .carousel-counter {
            position: absolute;
            top: 25px; right: 35px;
            background: rgba(0, 0, 0, 0.4);
            color: #ffffff;
            padding: 4px 14px;
            font-size: 13px;
            border-radius: 20px;
            letter-spacing: 1px;
            backdrop-filter: blur(4px);
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 10;
        }

        .carousel-caption {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            margin: 0;
            padding: 25px 100px 25px 35px;
            background: rgba(0, 0, 0, 0.6);
            color: #ffffff;
            font-size: 14px;
            letter-spacing: 1px;
            text-align: left;
            backdrop-filter: blur(4px);
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.4s ease, transform 0.4s ease;
            z-index: 5;
            line-height: 1.6;
        }

        .carousel-btn {
            position: absolute;
            top: calc(50% - 22px);
            background: rgba(255, 255, 255, 0.85);
            border: none;
            width: 44px; height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 10;
        }

        .carousel-btn:hover { background: rgba(255, 255, 255, 1); }
        .prev-btn { left: 20px; }
        .next-btn { right: 20px; }

        .carousel-container:hover .carousel-caption { opacity: 1; transform: translateY(0); }
        .carousel-container:hover .carousel-btn,
         .carousel-container:hover .carousel-counter { opacity: 1; }

        /* ==========================================
           5. 管理員功能表單彈出視窗 (Modal)
           ========================================== */
        .admin-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        .admin-modal-content {
            background-color: #fff;
            width: 90%;
            max-width: 650px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            position: relative;
        }
        .admin-modal-content h2 {
            margin-top: 0; font-size: 22px; color: #2c2c2c;
            border-bottom: 1px solid #eee; padding-bottom: 15px; font-weight: normal;
        }
        .close-modal-btn {
            position: absolute; top: 25px; right: 25px; font-size: 24px; color: #aaa;
            cursor: pointer; border: none; background: none;
        }
        .close-modal-btn:hover { color: #333; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 14px; color: #555; margin-bottom: 8px; font-weight: 500; }
        .form-group input[type="text"], .form-group input[type="color"], .form-group textarea {
            width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; color: #404040; font-family: inherit;
        }
        .form-group input[type="color"] { height: 40px; padding: 2px; cursor: pointer; }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #404040; }
        .form-hint { font-size: 12px; color: #999; margin-top: 4px; line-height: 1.5; }
        .form-submit-btn {
            width: 100%; padding: 14px; background-color: #404040; color: #fff; border: none; border-radius: 4px; font-size: 15px; cursor: pointer; letter-spacing: 1px; transition: background 0.3s;
        }
        .form-submit-btn:hover { background-color: #1a1a1a; }
        .form-submit-btn:disabled { background-color: #ccc; cursor: not-allowed; }

        /* ==========================================
           6. RWD 響應式手機板調整
           ========================================== */
        @media (max-width: 768px) {
            .hero-section { height: 240px; border-radius: 16px; }
            .hero-content { max-width: 240px; margin-right: 2%; padding: 15px; } /* 微調手機版寬度與內邊距 */
            .hero-content h1 { font-size: 16px; margin-bottom: 8px; }
            .hero-content p { font-size: 10px; }
            .hero-logo-btn { width: 40px; height: 40px; bottom: 29px; right: 15px;}
            .chapter-section { padding: 20px 10px; }
            .exhibition-block { flex-direction: column; gap: 30px; }
            .exhibition-image { min-width: 100%; }
            .carousel-slide img { height: 340px; }
            .carousel-caption, .carousel-btn, .carousel-counter { opacity: 1; transform: translateY(0); }
            .carousel-caption { padding: 15px 75px 15px 20px; font-size: 13px; text-align: left; }
            .carousel-counter { top: 15px; right: 20px; padding: 2px 10px; font-size: 11px; }
            .admin-modal-content { padding: 20px; width: 95%; }
            .chapter-header-wrap { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>

    <section class="hero-section" id="mainHeroSection">
        <button class="hero-logo-btn" id="secretAdminLogo" title="管理員登入">
            <img src="images/logo-small2.png" alt="空間客舍 Logo" oncontextmenu="return false;" ondragstart="return false;">
        </button>
        <div class="hero-content" id="heroDynamicContent">
            <h1>空間共學</h1>
            <p>以空間共學這個模式作為試驗，嘗試連結來自不同空間的人<br>讓大家可以到這裏一起分享、學習。</p>
        </div>
    </section>

    <main class="container" id="dynamicContainer">
        <div class="loading-status">正在載入篇章資料...</div>
    </main>

    <div class="admin-modal" id="adminModal">
        <div class="admin-modal-content">
            <button class="close-modal-btn" id="closeAdminBtn">&times;</button>
            <h2 id="modalFormTitle">新增章節內容</h2>
            
            <form id="chapterForm">
                <input type="hidden" id="editChapterId" value="">

                <div class="form-group">
                    <label for="chapterTitle">篇章名稱 *</label>
                    <input type="text" id="chapterTitle" placeholder="例如：大澳篇、深水埗篇" required>
                </div>

                <div class="form-group">
                    <label for="chapterBgColor">Hero 文字方塊背景顏色</label>
                    <input type="color" id="chapterBgColor" value="#000000">
                    <div class="form-hint">此處選擇的色彩將會以「半透明底色」方式動態套用至 Hero 文字方塊（hero-content）的背景。</div>
                </div>
                
                <div class="form-group">
                    <label for="exTitle">展覽名稱 *</label>
                    <input type="text" id="exTitle" placeholder="例如：展覽《標題名稱》" required>
                </div>

                <div class="form-group">
                    <label for="exImage">展覽海報圖片網址 *</label>
                    <input type="text" id="exImage" placeholder="https://static.wixstatic.com/..." required>
                </div>
                
                <div class="form-group">
                    <label for="exDesc1">展覽介紹第一段</label>
                    <textarea id="exDesc1" rows="3" placeholder="請輸入展覽文案第一段..."></textarea>
                </div>
                
                <div class="form-group">
                    <label for="exDesc2">展覽介紹第二段</label>
                    <textarea id="exDesc2" rows="3" placeholder="請輸入展覽文案第二段（選填）..."></textarea>
                </div>
                
                <div class="form-group">
                    <label for="exDate">展覽日期</label>
                    <input type="text" id="exDate" placeholder="例如：展覽日期：2026年6月12日 - 7月12日">
                </div>
                
                <div class="form-group">
                    <label for="exLink">Wix 作品詳細連結網址</label>
                    <input type="text" id="exLink" placeholder="https://studioslowpace.wixsite.com/...">
                </div>

                <hr style="border:0; border-top:1px solid #eee; margin:30px 0;">

                <div class="form-group">
                    <label for="tourTitle">共學活動/導賞活動標題</label>
                    <input type="text" id="tourTitle" placeholder="例如：空間共學 — 大澳社區導賞活動">
                </div>
                
                <div class="form-group">
                    <label for="tourImages">活動輪播相片與介紹清單 (一行一組) *</label>
                    <textarea id="tourImages" rows="6" placeholder="https://image1.jpg | 這是第一張照片的介紹" required></textarea>
                </div>
                
                <button type="submit" class="form-submit-btn" id="submitBtn">儲存並同步至網站</button>
            </form>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. 初始化 Supabase 連線資訊
        // ==========================================
        window.supabaseUrl = 'https://blqlrxqckiuvgevmakbu.supabase.co';
        window.supabaseKey = 'sb_publishable_qFXwpuGChVdRwjc9K7prVQ_PgYmlnpG';
        window.TABLE_NAME = 'chapters'; 
        window.client = supabase.createClient(window.supabaseUrl, window.supabaseKey);

        window.ADMIN_PASSWORD = '123456'; 
        window.isAdminMode = false;        

        // 💡 輔助函式：將 HEX 顏色轉為帶有透明度的 RGBA，讓文字底色有透明呼吸感
        function hexToRgbaStr(hex, alpha) {
            let c;
            if(/^#([A-Fa-f0-9]{3}){1,2}$/.test(hex)){
                c= hex.substring(1).split('');
                if(c.length== 3){
                    c= [c[0], c[0], c[1], c[1], c[2], c[2]];
                }
                c= '0x'+c.join('');
                return 'rgba('+[(c>>16)&255, (c>>8)&255, c&255].join(',')+','+alpha+')';
            }
            return 'rgba(0,0,0,0.5)'; // 預設黑底半透明
        }

        // ==========================================
        // 2. 從 Supabase 撈取資料並動態渲染前端
        // ==========================================
        window.fetchAndRenderChapters = async function() {
            const containerEl = document.getElementById('dynamicContainer');
            const heroContentEl = document.getElementById('heroDynamicContent');

            try {
                const { data: chapters, error } = await window.client
                    .from(window.TABLE_NAME)
                    .select(`*, carousel_slides (*)`)
                    .order('created_at', { ascending: true });

                if (error) throw error;

                if (!chapters || chapters.length === 0) {
                    containerEl.innerHTML = '<div class="loading-status">目前尚無篇章內容，請點選上方 Logo 輸入密碼新增。</div>';
                    return;
                }

                containerEl.innerHTML = '';
                window.loadedChaptersCache = chapters;

                // ─── 修正：精準將 bg_color 動態套用到 .hero-content 的 background ───
                if (chapters[0] && chapters[0].bg_color) {
                    // 這裡設定 0.55 的不透明度，能讓背景圖透出來，又看得很清楚文字
                    heroContentEl.style.backgroundColor = hexToRgbaStr(chapters[0].bg_color, 0.55);
                }

                chapters.forEach((chapter, index) => {
                    const chapterSec = document.createElement('section');
                    chapterSec.className = 'chapter-section';

                    const slides = chapter.carousel_slides || [];
                    slides.sort((a, b) => a.sort_order - b.sort_order);

                    let htmlContent = `
                        <div class="chapter-header-wrap">
                            <div class="chapter-title">
                                <h2>${chapter.title}</h2>
                            </div>
                            <div class="action-btns" style="display: ${window.isAdminMode ? 'flex' : 'none'};">
                                <button class="btn-edit" onclick="window.openEditModal(${chapter.id})">修改內容</button>
                                <button class="btn-delete" onclick="window.deleteChapter(${chapter.id})">刪除章節</button>
                            </div>
                        </div>
                        <div class="exhibition-block">
                            <div class="exhibition-image">
                                <img src="${chapter.ex_image || ''}" alt="${chapter.ex_title}">
                            </div>
                            <div class="exhibition-text">
                                <h3>${chapter.ex_title}</h3>
                                ${chapter.ex_desc_1 ? `<p>${chapter.ex_desc_1}</p>` : ''}
                                ${chapter.ex_desc_2 ? `<p>${chapter.ex_desc_2}</p>` : ''}
                                <p class="date">${chapter.ex_date || ''}</p>
                                <a href="${chapter.ex_link || '#'}" class="btn" target="_blank">
                                    展覽作品 <span class="arrow">&rarr;</span>
                                </a>
                            </div>
                        </div>
                        <hr class="divider">
                        <div class="tour-block">
                            <h3>${chapter.tour_title || '導賞活動'}</h3>
                            <div class="carousel-container">
                                <div class="carousel-counter"></div>
                                <button class="carousel-btn prev-btn">&#10094;</button>
                                <button class="carousel-btn next-btn">&#10095;</button>
                                <div class="carousel-wrapper">
                    `;

                    slides.forEach(slide => {
                        htmlContent += `
                            <div class="carousel-slide">
                                <img src="${slide.image_url}" alt="${slide.caption || ''}">
                                ${slide.caption ? `<p class="carousel-caption">${slide.caption}</p>` : ''}
                            </div>
                        `;
                    });

                    htmlContent += `
                                </div>
                            </div>
                        </div>
                    `;

                    chapterSec.innerHTML = htmlContent;
                    containerEl.appendChild(chapterSec);

                    const carouselContainer = chapterSec.querySelector('.carousel-container');
                    if (slides.length > 0) {
                        window.initCarousel(carouselContainer);
                    }
                });

            } catch (err) {
                console.error('資料載入失敗:', err);
                containerEl.innerHTML = '<div class="loading-status" style="color:red;">資料載入失敗。</div>';
            }
        };

        // ==========================================
        // 3. 多組獨立輪播控制引擎
        // ==========================================
        window.initCarousel = function(container) {
            const wrapper = container.querySelector('.carousel-wrapper');
            const counter = container.querySelector('.carousel-counter');
            const prevBtn = container.querySelector('.prev-btn');
            const nextBtn = container.querySelector('.next-btn');
            const slides = container.querySelectorAll('.carousel-slide');
            
            let currentIndex = 0;
            let timer = null;
            const total = slides.length;

            function updateCarousel() {
                wrapper.style.transform = `translateX(-${currentIndex * 100}%)`;
                if (counter) {
                    counter.textContent = `${currentIndex + 1} / ${total}`;
                }
            }

            function nextSlide() { currentIndex = (currentIndex + 1) % total; updateCarousel(); }
            function prevSlide() { currentIndex = (currentIndex - 1 + total) % total; updateCarousel(); }

            nextBtn.onclick = (e) => { e.stopPropagation(); nextSlide(); };
            prevBtn.onclick = (e) => { e.stopPropagation(); prevSlide(); };

            function startAutoPlay() { if (!timer && total > 1) timer = setInterval(nextSlide, 3500); }
            function stopAutoPlay() { if (timer) { clearInterval(timer); timer = null; } }

            updateCarousel();
            startAutoPlay();
            container.addEventListener('mouseenter', stopAutoPlay);
            container.addEventListener('mouseleave', startAutoPlay);
        };

        // ==========================================
        // 4. 管理員功能與彈出視窗控制
        // ==========================================
        const modal = document.getElementById('adminModal');
        const form = document.getElementById('chapterForm');
        const submitBtn = document.getElementById('submitBtn');

        document.getElementById('secretAdminLogo').onclick = () => {
            if (window.isAdminMode) {
                window.openCreateModal();
                return;
            }

            const pwd = prompt('管理員驗證 — 請輸入密碼：');
            if (pwd === window.ADMIN_PASSWORD) {
                window.isAdminMode = true; 
                alert('🔓 管理員權限已解鎖！現已顯示各章節的修改與刪除按鈕。');
                document.querySelectorAll('.action-btns').forEach(block => { block.style.display = 'flex'; });
            } else if (pwd !== null) { 
                alert('密碼錯誤！'); 
            }
        };

        window.openCreateModal = function() {
            document.getElementById('modalFormTitle').textContent = '新增章節內容';
            document.getElementById('editChapterId').value = '';
            form.reset();
            document.getElementById('chapterBgColor').value = '#000000';
            modal.style.display = 'flex';
        };

        window.openEditModal = function(id) {
            if (!window.isAdminMode) return; 
            const chapter = window.loadedChaptersCache.find(c => c.id === id);
            if (!chapter) return;

            document.getElementById('modalFormTitle').textContent = `修改內容 — ${chapter.title}`;
            document.getElementById('editChapterId').value = chapter.id;
            document.getElementById('chapterTitle').value = chapter.title;
            document.getElementById('chapterBgColor').value = chapter.bg_color || '#000000';
            document.getElementById('exTitle').value = chapter.ex_title;
            document.getElementById('exImage').value = chapter.ex_image;
            document.getElementById('exDesc1').value = chapter.ex_desc_1 || '';
            document.getElementById('exDesc2').value = chapter.ex_desc_2 || '';
            document.getElementById('exDate').value = chapter.ex_date || '';
            document.getElementById('exLink').value = chapter.ex_link || '';
            document.getElementById('tourTitle').value = chapter.tour_title || '';

            const sortedSlides = (chapter.carousel_slides || []).sort((a,b)=> a.sort_order - b.sort_order);
            const lines = sortedSlides.map(s => s.caption ? `${s.image_url} | ${s.caption}` : s.image_url);
            document.getElementById('tourImages').value = lines.join('\n');

            modal.style.display = 'flex';
        };

        window.deleteChapter = async function(id) {
            if (!window.isAdminMode) return;
            if (!confirm('確定要永久刪除整個章節嗎？')) return;
            try {
                const { error } = await window.client.from(window.TABLE_NAME).delete().eq('id', id);
                if (error) throw error;
                alert('章節已成功刪除！');
                window.fetchAndRenderChapters();
            } catch (err) { alert('刪除失敗: ' + err.message); }
        };

        document.getElementById('closeAdminBtn').onclick = () => { modal.style.display = 'none'; };

        // ==========================================
        // 5. 處理表單提交
        // ==========================================
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.textContent = '正在同步至雲端資料庫...';

            const editId = document.getElementById('editChapterId').value;
            const chapterTitleStr = document.getElementById('chapterTitle').value.trim();
            
            const payload = {
                title: chapterTitleStr,
                bg_color: document.getElementById('chapterBgColor').value, 
                ex_title: document.getElementById('exTitle').value.trim(),
                ex_image: document.getElementById('exImage').value.trim(),
                ex_desc_1: document.getElementById('exDesc1').value.trim(),
                ex_desc_2: document.getElementById('exDesc2').value.trim(),
                ex_date: document.getElementById('exDate').value.trim(),
                ex_link: document.getElementById('exLink').value.trim(),
                tour_title: document.getElementById('tourTitle').value.trim()
            };

            const rawLines = document.getElementById('tourImages').value.split('\n');
            const slideRowsData = [];

            rawLines.forEach((line, idx) => {
                const cleanLine = line.trim();
                if (cleanLine.length === 0) return;
                let url = cleanLine;
                let caption = chapterTitleStr + '活動相片'; 
                if (cleanLine.includes('|')) {
                    const parts = cleanLine.split('|');
                    url = parts[0].trim();
                    caption = parts[1] ? parts[1].trim() : caption;
                }
                slideRowsData.push({ url, caption, order: idx });
            });

            try {
                let targetChapterId = editId;
                if (editId) {
                    const { error: updateError } = await window.client.from(window.TABLE_NAME).update(payload).eq('id', editId);
                    if (updateError) throw updateError;
                    await window.client.from('carousel_slides').delete().eq('chapter_id', editId);
                } else {
                    const { data: insertData, error: insertError } = await window.client.from(window.TABLE_NAME).insert([payload]).select();
                    if (insertError) throw insertError;
                    targetChapterId = insertData[0].id;
                }

                if (slideRowsData.length > 0) {
                    const slideRows = slideRowsData.map(item => ({
                        chapter_id: targetChapterId,
                        image_url: item.url,
                        caption: item.caption,
                        sort_order: item.order
                    }));
                    const { error: slidesError } = await window.client.from('carousel_slides').insert(slideRows);
                    if (slidesError) throw slidesError;
                }

                alert('🎉 資料雲端同步成功！');
                modal.style.display = 'none';
                form.reset();
                window.fetchAndRenderChapters();
            } catch (err) {
                alert('儲存失敗: ' + err.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '儲存並同步至網站';
            }
        });

        window.addEventListener('DOMContentLoaded', window.fetchAndRenderChapters);
    </script>
</body>
</html>
