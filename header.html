<style>
    /* 頁首專屬全站通用設定 */
    .navbar-wrapper {
        width: 100%;
        background-color: #ffffff;
        display: flex;
        justify-content: center;
        border-bottom: 1px solid #EAEAEA;
    }
    .navbar {
        width: 100%;
        max-width: 1600px; 
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0px 50px;
    }

    .logo-area {
        display: flex;
        align-items: center;
        gap: 20px;
    }
    .logo-icon img {
        height: auto;           /* 讓寬度決定高度，維持比例 */
        max-height: 120px;      /* 設定一個上限，防止變太巨大 */
        width: auto;
        object-fit: contain;
    }

    .nav-links {
        display: flex;
        gap: 35px;
    }
    .nav-links a {
        text-decoration: none;
        color: #333333;
        font-size: 1.25rem;
        font-weight: 500;
        transition: color 0.2s;
    }
    .nav-links a:hover {
        color: #1465A3;
    }

    .menu-toggle { display: none; background: none; border: none; font-size: 2rem; cursor: pointer; }

    /* 頁首響應式手機板優化 */
    @media (max-width: 1024px) {
        .navbar { padding: 25px 30px; }
        .logo-icon img { height: 100px; }
        .nav-links a { font-size: 1.1rem; }
    }
    @media (max-width: 768px) {
        .navbar { flex-direction: column; gap: 20px; padding: 20px; position: relative;}
        .nav-links { flex-wrap: wrap; justify-content: center; gap: 15px; }
        /* 顯示按鈕 */
    .menu-toggle { display: block; }

    /* 選單變成垂直下拉，預設隱藏 */
    .nav-links {
        display: none; 
        flex-direction: column;
        position: absolute;
        top: 80px; /* 根據你的 Header 高度設定 */
        left: 0;
        width: 100%;
        background: #fff;
        padding: 20px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
.logo-area {
        width: 100%;
        display: flex;
        justify-content: space-between; /* 讓 Logo 在左，按鈕在右 */
        align-items: center;
    }
    }
    .nav-links.active {
    display: flex;
    z-index: 9999; /* 讓選單蓋在所有內容之上 */
}

</style>

<header class="navbar">
    <div class="logo-area">
        <div class="logo-icon">
            <img src="images/logo-rectangular.png" alt="空間客舍 Logo">
        </div>
        <button class="menu-toggle" aria-label="打開選單">☰</button>
    </div>
    <nav class="nav-links">
        <a href="index.html">自主企劃 Passion Project</a>
        <a href="about.html">活動報名</a>
        <a href="month.html">客舍時間表</a>
        <a href="#">客棧時間表</a>
        <a href="#">客舍電子報</a>
        <a href="#">客舍萬事屋</a>
        <a href="#">更多</a>
    </nav>
</header>

<script>
    const toggleButton = document.querySelector('.menu-toggle');
    const navLinks = document.querySelector('.nav-links');

    toggleButton.addEventListener('click', (e) => {
        navLinks.classList.toggle('active');
        e.stopPropagation(); // 防止點擊按鈕時觸發後面的關閉邏輯
    });

    // 點擊網頁任何地方時關閉選單
    document.addEventListener('click', (e) => {
        if (navLinks.classList.contains('active') && !navLinks.contains(e.target) && e.target !== toggleButton) {
            navLinks.classList.remove('active');
        }
    });
</script>
